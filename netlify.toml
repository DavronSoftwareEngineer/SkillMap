# Netlify deploy sozlamasi
[build]
  command = "npm run build"
  publish = "dist"

# SPA — barcha yo'llar index.html'ga (klient routing uchun)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker har doim yangilangan bo'lsin (keshlanmasin)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
