name: geopulse-lab

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geopulse}
      POSTGRES_USER: ${POSTGRES_USER:-geopulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-for-local-development}
    volumes:
      - geopulse-db:/var/lib/postgresql/data
      - ./database/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geopulse} -d ${POSTGRES_DB:-geopulse}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5433:5432"

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://geopulse:change-me-for-local-development@db:5432/geopulse}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    depends_on:
      api:
        condition: service_healthy

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  geopulse-db:
