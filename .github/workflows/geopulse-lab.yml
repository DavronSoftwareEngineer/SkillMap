name: GeoPulse lab quality gate

on:
  pull_request:
    paths:
      - "labs/geopulse/**"
      - ".github/workflows/geopulse-lab.yml"
  push:
    paths:
      - "labs/geopulse/**"
      - ".github/workflows/geopulse-lab.yml"

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs/geopulse/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: mypy app
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs/geopulse/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  compose-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp labs/geopulse/.env.example labs/geopulse/.env
      - run: docker compose -f labs/geopulse/compose.yaml config --quiet

  end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp labs/geopulse/.env.example labs/geopulse/.env
      - run: docker compose -f labs/geopulse/compose.yaml up --build --detach --wait
      - run: bash labs/geopulse/scripts/smoke-test.sh
      - name: Show service logs on failure
        if: failure()
        run: docker compose -f labs/geopulse/compose.yaml logs --no-color
      - name: Stop lab
        if: always()
        run: docker compose -f labs/geopulse/compose.yaml down --volumes
